# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: local
    hooks:
      - id: build-install-sh
        name: build install.sh
        entry: installers/build.py
        files: "^installers/"
        language: script

        types: [shell]
      - id: dash-syntax
        name: POSIX syntax check (dash -n)
        description: Parse installer scripts with dash to catch bashisms
        entry: scripts/dash-syntax-check.sh
        language: script
        files: '(^installers/.*\.sh$)|((^|/)install-[A-Za-z0-9-]+\.sh$)|(^install\.sh$)|(^update\.sh$)'
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        files: '(^installers/)|((^|/)install-[A-Za-z0-9-]+\.sh$)|(dotfiles\.sh)'
        args: ["-x"]
  - repo: https://github.com/psf/black
    rev: 25.9.0
    hooks:
      - id: black
  - repo: https://github.com/pycqa/flake8
    rev: "7.3.0"
    hooks:
      - id: flake8
        files: "^installers/"
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: "v1.18.2" # Use the sha / tag you want to point at
    hooks:
      - id: mypy
        files: "^installers/"
  - repo: https://github.com/asottile/reorder-python-imports
    rev: v3.15.0
    hooks:
      - id: reorder-python-imports
        files: "^installers/"
